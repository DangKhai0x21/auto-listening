<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-2xl border border-slate-700/50">
        <div class="flex items-center gap-3 mb-6 border-b border-slate-700 pb-4">
            <div class="p-3 bg-indigo-600 rounded-xl text-white shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-shuffle text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">IELTS Listening Random</h1>
                <p id="repoStatus" class="text-xs text-slate-400">Đang quét kho nhạc từ GitHub...</p>
            </div>
        </div>

        <div class="bg-slate-950/60 rounded-xl p-6 border border-slate-800 mb-6 text-center">
            <span class="text-[10px] bg-indigo-500/20 text-indigo-400 font-bold px-2.5 py-1 rounded-full uppercase tracking-wider mb-2 inline-block">
                Bài học đang phát
            </span>
            <div id="currentTitle" class="text-xl font-bold text-slate-200 mb-1">Đang chọn bài...</div>
            <div id="audioFileName" class="text-xs font-mono text-slate-500 mb-4 flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-link text-[10px]"></i> <span>--</span>
            </div>

            <audio id="audioPlayer" controls class="w-full accent-indigo-500 bg-slate-900 rounded-lg mb-2"></audio>
            <div id="audioError" class="text-xs text-rose-400 hidden mt-2"><i class="fa-solid fa-circle-exclamation"></i> Không thể tải file âm thanh này từ GitHub.</div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 items-center justify-between">
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="prevBtn" disabled class="flex-1 sm:flex-initial bg-slate-700 hover:bg-slate-600 active:scale-95 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-1.5 disabled:opacity-40 disabled:pointer-events-none">
                    <i class="fa-solid fa-chevron-left text-xs"></i> Trước
                </button>
                
                <button id="randomBtn" class="flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/30">
                    <i class="fa-solid fa-dice text-base animate-pulse"></i> Bài ngẫu nhiên
                </button>

                <button id="nextBtn" disabled class="flex-1 sm:flex-initial bg-slate-700 hover:bg-slate-600 active:scale-95 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-1.5 disabled:opacity-40 disabled:pointer-events-none">
                    Tiếp <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>

            <button id="webLink" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/20 cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-down"></i> Xem câu hỏi & Song ngữ
            </button>
        </div>

        <div id="contentBlock" class="mt-6 border-t border-slate-700 pt-4 hidden">
            <h4 class="text-sm font-semibold text-indigo-400 mb-2 flex items-center gap-2">
                <i class="fa-solid fa-file-lines"></i> Nội dung chi tiết bài học:
            </h4>
            <div id="contentText" class="bg-slate-900/90 rounded-xl p-4 text-sm text-slate-300 max-h-96 overflow-y-auto leading-relaxed border border-slate-800 space-y-4"></div>
        </div>
    </div>

        // DOM Elements
        const currentTitle = document.getElementById('currentTitle');
        const audioFileName = document.querySelector('#audioFileName span');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioError = document.getElementById('audioError');
        const webLink = document.getElementById('webLink');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const randomBtn = document.getElementById('randomBtn');
        const contentBlock = document.getElementById('contentBlock');
        const contentText = document.getElementById('contentText');
        const repoStatus = document.getElementById('repoStatus');

        let audioFilesMap = {}; 
        let sortedKeys = [];
        let currentIndex = -1;
        let currentTargetUrl = "";

        // --- BƯỚC 1: QUÉT TOÀN BỘ FILE MP3 TỪ GITHUB API ---
        async function loadGitHubFiles() {
            try {
                const response = await fetch('https://api.github.com/repos/DangKhai0x21/auto-listening/contents/audio-files');
                if (!response.ok) throw new Error('API Rate Limit hoặc Repo sai đường dẫn');
                
                const data = await response.json();
                const mp3Files = data.filter(file => file.name.toLowerCase().endsWith('.mp3'));

                if(mp3Files.length === 0) throw new Error('Không tìm thấy file mp3 nào');

                mp3Files.forEach(file => {
                    const cleanName = file.name.replace(/\.[^/.]+$/, ""); // Bỏ đuôi .mp3
                    const numbers = cleanName.match(/\d+/g); // Quét chuỗi số
                    
                    let key = "";
                    if (numbers && numbers.length >= 3) {
                        key = `C${numbers[0]}_T${numbers[1]}_P${numbers[2]}`;
                    } else {
                        key = "RAW_" + btoa(unescape(encodeURIComponent(file.name))).substring(0, 8);
                    }

                    audioFilesMap[key] = {
                        name: file.name,
                        download_url: file.download_url,
                        isMapped: !key.startsWith("RAW_")
                    };
                });

                repoStatus.innerHTML = `<span class="text-emerald-400"><i class="fa-solid fa-circle-check"></i> Đã nạp thành công ${mp3Files.length} bài nghe!</span>`;
                initAppStructure();

            } catch (error) {
                console.warn("Chuyển sang cấu hình danh sách dự phòng...", error);
                repoStatus.innerHTML = `<span class="text-amber-400"><i class="fa-solid fa-triangle-exclamation"></i> Chế độ tải dự phòng (API GitHub nghẽn)</span>`;
                generateFallbackTree();
            }
        }

        function generateFallbackTree() {
            Object.keys(LEAN_DATA_BASE).forEach(key => {
                const [c, t, p] = key.split('_');
                const camNum = c.substring(1);
                const testNum = t.substring(1);
                const partNum = p.substring(1);
                const fileName = `Cam ${camNum} – Test ${testNum} – Section ${partNum}.mp3`;

                audioFilesMap[key] = {
                    name: fileName,
                    download_url: `https://raw.githubusercontent.com/DangKhai0x21/auto-listening/main/audio-files/${encodeURIComponent(fileName)}`,
                    isMapped: true
                };
            });
            initAppStructure();
        }

        // --- BƯỚC 2: KHỞI TẠO VÀ SẮP XẾP ---
        function initAppStructure() {
            sortedKeys = Object.keys(audioFilesMap).sort((a, b) => {
                if (a.startsWith("RAW_") || b.startsWith("RAW_")) return 0;
                const parse = k => k.split('_').map(x => parseInt(x.substring(1)));
                const [ca, ta, pa] = parse(a);
                const [cb, tb, pb] = parse(b);
                return ca !== cb ? ca - cb : ta !== tb ? ta - tb : pa - pb;
            });

            if (sortedKeys.length > 0) {
                pickRandomAudio(false); 
            } else {
                currentTitle.textContent = "Không có bài học nào!";
            }
        }

        function pickRandomAudio(shouldPlay = true) {
            if (sortedKeys.length === 0) return;
            const randomIndex = Math.floor(Math.random() * sortedKeys.length);
            currentIndex = randomIndex;
            renderCurrentAudio(shouldPlay);
        }

        // --- BƯỚC 3: PHÁT NHẠC & KHÓA CHẶT URL SONG NGỮ ---
        function renderCurrentAudio(shouldPlay = true) {
            const key = sortedKeys[currentIndex];
            const audioData = audioFilesMap[key];
            const songNguData = LEAN_DATA_BASE[key];
            
            contentBlock.classList.add('hidden');
            contentText.innerHTML = '';
            audioError.classList.add('hidden');
            
            if (audioData) {
                currentTitle.textContent = audioData.name.replace('.mp3', '');
                audioFileName.textContent = audioData.name;
                
                audioPlayer.src = audioData.download_url;
                audioPlayer.load();
                
                if (shouldPlay) {
                    audioPlayer.play().catch(() => console.log("Chờ tương tác của user để phát nhạc"));
                }
                
                currentTargetUrl = (audioData.isMapped && songNguData) ? songNguData.url : "";
            }

            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= sortedKeys.length - 1;
        }

        // Bắt lỗi nếu đường dẫn âm thanh CDN bị hỏng
        audioPlayer.addEventListener('error', () => {
            audioError.classList.remove('hidden');
        });

        // --- TÍNH NĂNG MỚI: TỰ ĐỘNG CHUYỂN BÀI KHI AUDIO KẾT THÚC ---
        audioPlayer.addEventListener('ended', () => {
            console.log("Bài học hiện tại đã phát xong. Hệ thống tự động chuyển bài...");
            if (currentIndex < sortedKeys.length - 1) {
                // Nếu vẫn chưa phải bài cuối danh sách, tự động nhảy lên bài tiếp theo
                navigate(1);
            } else {
                // Nếu đã nghe hết sạch danh sách, tự động quay về bài ngẫu nhiên để lặp lại chu kỳ học
                pickRandomAudio(true);
            }
        });

        // --- BƯỚC 4: FETCH NỘI DUNG VÀ XOÁ BỎ RÁC/SVG THEO YÊU CẦU ---
        webLink.addEventListener('click', function(event) {
            event.preventDefault();
            if (!currentTargetUrl) {
                alert("Bài học ngẫu nhiên này hiện chưa khớp hoặc chưa được cập nhật liên kết song ngữ trên hệ thống!");
                return;
            }

            contentBlock.classList.remove('hidden');
            contentText.innerHTML = `
                <div class="text-center text-amber-400 py-6">
                    <i class="fa-solid fa-spinner animate-spin mr-2 text-lg"></i> Đang bóc tách dữ liệu câu hỏi sạch qua CORS Proxy...
                </div>
            `;

            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(currentTargetUrl)}`;

            fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Proxy error');
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const mainArticle = doc.querySelector('.entry-content') || doc.querySelector('article') || doc.body;
                
                mainArticle.querySelectorAll('script, style, iframe, header, footer, nav, .sharedaddy').forEach(el => el.remove());
                
                mainArticle.querySelectorAll('path[d^="M6.5 0C3.48"]').forEach(path => {
                    const parentSvg = path.closest('svg');
                    if (parentSvg) parentSvg.remove();
                });
                
                contentText.innerHTML = mainArticle.innerHTML;
                contentBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            })
            .catch(error => {
                console.error(error);
                contentText.innerHTML = `
                    <div class="p-3 border border-rose-800/50 bg-rose-950/30 rounded-xl text-center">
                        <p class="text-rose-400 font-bold mb-1"><i class="fa-solid fa-circle-exclamation mr-1"></i> Lỗi kết nối Proxy</p>
                        <p class="text-xs text-slate-400">Bạn hãy thử bấm lại nút một lần nữa để Proxy tải lại dữ liệu nhé.</p>
                    </div>
                `;
            });
        });

        // Điều khiển nút bấm cơ bản
        randomBtn.addEventListener('click', () => pickRandomAudio(true));

        function navigate(direction) {
            const targetIndex = currentIndex + direction;
            if (targetIndex >= 0 && targetIndex < sortedKeys.length) {
                currentIndex = targetIndex;
                renderCurrentAudio(true);
            }
        }

        prevBtn.addEventListener('click', () => navigate(-1));
        nextBtn.addEventListener('click', () => navigate(1));

        // Khởi động ứng dụng
        loadGitHubFiles();
    </script>
</body>
</html>
