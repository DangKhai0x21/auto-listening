<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge IELTS Audio - Auto Play</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #60a5fa;
        }
        #player {
            text-align: center;
            margin: 30px 0;
        }
        audio {
            width: 90%;
            max-width: 700px;
        }
        #current {
            font-size: 1.3em;
            margin: 15px 0;
            color: #93c5fd;
        }
        ul {
            max-width: 800px;
            margin: 20px auto;
            list-style: none;
            padding: 0;
        }
        li {
            padding: 12px 15px;
            background: #1e2937;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        li:hover, li.playing {
            background: #3b82f6;
            color: white;
        }
        .status {
            text-align: center;
            margin: 15px;
            font-style: italic;
            color: #facc15;
        }
    </style>
</head>
<body>
    <h1>🎧 Cambridge IELTS 8-19 - Auto Play</h1>
    
    <div id="player">
        <div id="current">Đang tải danh sách...</div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <div class="status" id="status">Đang kết nối qua proxy...</div>

    <ul id="playlist"></ul>

    <script>
        const audio = document.getElementById('audioPlayer');
        const currentTitle = document.getElementById('current');
        const playlistEl = document.getElementById('playlist');
        const statusEl = document.getElementById('status');

        let tracks = [];
        let currentIndex = 0;

        // ==================== PROXY BYPASS ====================
        const proxies = [
            "https://api.codetabs.com/v1/proxy?quest=",
            "https://corsproxy.io/?",
            "https://proxy.cors.sh/",
            "https://api.allorigins.win/raw?url=",
            "https://cors.bridged.cc/"
        ];

        async function fetchWithProxy(url) {
            for (let proxy of proxies) {
                try {
                    let fullUrl = proxy + encodeURIComponent(url);
                    if (proxy.includes("corsproxy.io")) fullUrl = proxy + encodeURIComponent(url);
                    if (proxy.includes("proxy.cors.sh")) fullUrl = proxy + url;

                    const response = await fetch(fullUrl, { 
                        mode: 'cors',
                        headers: proxy.includes("cors.sh") ? { "x-cors-api-key": "temp" } : {}
                    });

                    if (response.ok) {
                        return await response.text();
                    }
                } catch (e) {
                    console.log(`Proxy ${proxy} thất bại, thử proxy tiếp theo...`);
                }
            }
            throw new Error("Tất cả proxy đều không hoạt động");
        }
        // ====================================================

        async function fetchTracks() {
            const targetUrl = "https://ieltsxuanphi.edu.vn/full-bo-tai-lieu-cambridge-ielts/";
            
            try {
                statusEl.textContent = "Đang tải danh sách audio qua proxy...";
                
                const html = await fetchWithProxy(targetUrl);

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Lấy tất cả link mp3
                const links = doc.querySelectorAll('a[href$=".mp3"]');
                
                tracks = Array.from(links).map(link => {
                    let url = link.href;
                    const name = link.textContent.trim() || url.split('/').pop().replace('.mp3', '');
                    return { name, url };
                });

                // Fallback nếu không lấy được bằng DOM
                if (tracks.length === 0) {
                    const regex = /https?:\/\/[^\s"']+\.mp3/g;
                    const matches = html.match(regex) || [];
                    tracks = matches.map(url => ({
                        name: decodeURIComponent(url.split('/').pop().replace('.mp3', '')),
                        url: url
                    }));
                }

                if (tracks.length === 0) {
                    throw new Error("Không tìm thấy audio nào.");
                }

                renderPlaylist();
                statusEl.innerHTML = `✅ Thành công! Tìm thấy <strong>${tracks.length}</strong> audio`;
                
                playTrack(0);

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `❌ Không thể tải dữ liệu.<br>
                <small>Thử refresh trang hoặc chờ proxy hoạt động trở lại.</small>`;
            }
        }

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.textContent = `${index + 1}. ${track.name}`;
                li.onclick = () => playTrack(index);
                playlistEl.appendChild(li);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            
            currentIndex = index;
            const track = tracks[index];
            
            audio.src = track.url;
            currentTitle.textContent = `Đang phát: ${track.name}`;
            
            document.querySelectorAll('li').forEach((li, i) => {
                li.classList.toggle('playing', i === index);
            });

            audio.play().catch(() => {});
        }

        audio.addEventListener('ended', () => {
            currentIndex = (currentIndex + 1) % tracks.length;
            playTrack(currentIndex);
        });

        // Khởi chạy
        window.onload = fetchTracks;
    </script>
</body>
</html>
